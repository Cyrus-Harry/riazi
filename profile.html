<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>پروفایل من | ریاضی‌یار</title>
    <link rel="stylesheet" href="profile.css">
</head>
<body>
    <header>
        <h1>👤 پروفایل من</h1>
        <nav>
            <a href="index.html">خانه</a>
            <a href="math.html">فرمول‌ها</a>
            <a href="questions.html">انجمن</a>
            <a href="ask.html">سوال جدید</a>
            <a href="contact.html">تماس با مدیر</a>
            <a href="profile.html" class="active">پروفایل</a>
            <a href="login.html" id="logoutLink">خروج</a>
        </nav>
    </header>

    <main>
        <div id="notLoggedIn" style="display:none;" class="profile-card">
            <p style="text-align:center;font-size:1.1rem;">⚠️ برای مشاهده پروفایل باید <a href="login.html">وارد شوید</a>.</p>
        </div>

        <div id="profileContent" style="display:none;">
            <!-- کارت اطلاعات اصلی -->
            <div class="profile-card">
                <div class="avatar">👤</div>
                <div class="profile-info">
                    <h2 id="profileUsername"></h2>
                    <span id="profileBadge" class="badge"></span>
                </div>
                <div class="score-box">
                    <div class="score-number" id="profileScore">0</div>
                    <div class="score-label">امتیاز کل</div>
                </div>
            </div>

            <!-- آمار کلی -->
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-icon">💬</div>
                    <div class="stat-number" id="totalAnswers">0</div>
                    <div class="stat-label">کل پاسخ‌ها</div>
                </div>
                <div class="stat-card" style="border-color:#f1c40f;">
                    <div class="stat-icon">⭐</div>
                    <div class="stat-number" id="bestAnswers">0</div>
                    <div class="stat-label">پاسخ‌های برگزیده</div>
                </div>
                <div class="stat-card" style="border-color:#e74c3c;">
                    <div class="stat-icon">❓</div>
                    <div class="stat-number" id="totalQuestions">0</div>
                    <div class="stat-label">سوالات پرسیده</div>
                </div>
                <div class="stat-card" style="border-color:#2ecc71;">
                    <div class="stat-icon">🏆</div>
                    <div class="stat-number" id="successRate">0%</div>
                    <div class="stat-label">نرخ موفقیت</div>
                </div>
            </div>

            <!-- نوار پیشرفت سطح -->
            <div class="profile-card">
                <h3 style="margin-bottom:12px;">🎯 سطح شما</h3>
                <div class="level-info">
                    <span id="levelName" class="level-badge">مبتدی</span>
                    <span id="nextLevel" style="font-size:0.85rem;color:#888;"></span>
                </div>
                <div class="progress-bar-bg">
                    <div class="progress-bar-fill" id="progressBar"></div>
                </div>
                <p id="progressText" style="font-size:0.85rem;color:#888;margin-top:6px;text-align:center;"></p>
            </div>

            <!-- پاسخ‌های برگزیده من -->
            <div class="profile-card">
                <h3 style="margin-bottom:12px;">⭐ پاسخ‌های برگزیده من</h3>
                <div id="bestAnswersList"></div>
            </div>

            <!-- آخرین پاسخ‌های من -->
            <div class="profile-card">
                <h3 style="margin-bottom:12px;">💬 آخرین پاسخ‌های من</h3>
                <div id="recentAnswersList"></div>
            </div>
        </div>
    </main>

    <footer>
        <p>© ۱۴۰۴ - سایت ریاضی‌یار</p>
    </footer>

    <script src="api.js"></script>
    <script src="profile.js"></script>
</body>
</html>
