<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ثبت سوال جدید | انجمن ریاضی</title>
    <link rel="stylesheet" href="ask.css">
    <script src="https://cdn.jsdelivr.net/npm/remote-storage@latest/remoteStorage.min.js"></script>
</head>
<body>
    <header>
        <h1>📝 ثبت سوال جدید</h1>
        <nav>
            <a href="index.html">خانه</a>
            <a href="math.html">فرمول‌ها</a>
            <a href="questions.html">انجمن</a>
            <a href="ask.html" class="active">سوال جدید</a>
            <a href="contact.html">تماس با مدیر</a>
            <a href="login.html">ورود</a>
        </nav>
    </header>
    <main>
        <div class="ask-container">
            <h2>سوال ریاضی خود را بپرسید</h2>
            <p>لطفاً عنوان و توضیحات سوال را وارد کنید.</p>
            <form id="askForm">
                <label>عنوان سوال:</label>
                <input type="text" id="questionTitle" required placeholder="مثال: نحوه محاسبه مساحت دایره">
                <label>متن سوال (توضیحات):</label>
                <textarea id="questionBody" rows="5" required placeholder="سوال خود را کامل بنویسید..."></textarea>
                <button type="submit">ارسال سوال</button>
            </form>
            <div id="message"></div>
        </div>
    </main>
    <footer>
        <p>© ۱۴۰۴ - سایت ریاضی‌یار | پرسش و پاسخ ریاضی</p>
    </footer>
    <script src="api.js"></script>
    <script src="ask.js"></script>
</body>
