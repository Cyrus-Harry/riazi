<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ثبت‌نام | سایت ریاضی</title>
    <link rel="stylesheet" href="register.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
    <div class="register-container">
        <div class="register-header">
            <h2>ثبت‌نام در سایت ریاضی‌یار</h2>
            <button id="themeToggle" class="theme-btn"><i class="fas fa-moon"></i></button>
        </div>
        <form id="registerForm">
            <div class="input-group">
                <label>نام کاربری</label>
                <input type="text" id="username" required placeholder="نام کاربری">
                <i class="fas fa-user input-icon"></i>
            </div>
            <div class="input-group">
                <label>رمز عبور</label>
                <input type="password" id="password" required placeholder="رمز عبور (حداقل ۴ کاراکتر)">
                <i class="fas fa-lock input-icon"></i>
            </div>
            <div class="input-group">
                <label>تکرار رمز عبور</label>
                <input type="password" id="confirmPassword" required placeholder="تکرار رمز عبور">
                <i class="fas fa-check input-icon"></i>
            </div>
            <button type="submit" id="registerBtn">
                <span class="btn-text">ثبت‌نام</span>
                <span class="btn-loader" style="display:none;"><i class="fas fa-spinner fa-spin"></i></span>
            </button>
        </form>
        <div id="message" class="form-message"></div>
        <p>قبلاً ثبت‌نام کرده‌اید؟ <a href="login.html">وارد شوید</a></p>
        <p><a href="index.html">بازگشت به خانه</a></p>
    </div>

    <div id="notification" class="notification"></div>
    <script src="api.js"></script>
    <script src="admins.js"></script>
    <script src="register.js"></script>
</body>
</html>
