<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ثبت‌نام | سایت ریاضی</title>
    <link rel="stylesheet" href="register.css">
    <script src="https://cdn.jsdelivr.net/npm/remote-storage@latest/remoteStorage.min.js"></script>
</head>
<body>
    <div class="register-container">
        <h2>ثبت‌نام در سایت ریاضی‌یار</h2>
        <form id="registerForm">
            <label>نام کاربری:</label>
            <input type="text" id="username" required>
            <label>رمز عبور:</label>
            <input type="password" id="password" required>
            <label>تکرار رمز عبور:</label>
            <input type="password" id="confirmPassword" required>
            <button type="submit">ثبت‌نام</button>
        </form>
        <div id="message" style="margin-top: 15px; text-align: center; font-weight: bold; min-height: 24px;"></div>

        <p>قبلاً ثبت‌نام کرده‌اید؟ <a href="login.html">وارد شوید</a></p>
        <p><a href="index.html">بازگشت به خانه</a></p>
    </div>
    <script src="api.js"></script>
    <script src="admins.js"></script>   <!-- ← فایل جدید -->
    <script src="register.js"></script>
</body>
</html>
